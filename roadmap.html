<!--- W2 Employees, 1099 Self-Employed, 1099B Investors-->
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<link rel="icon" type="image/png" href="../imgs/favicon.png">
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Tax Quest</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
	<style>
		:root {
			--parchment-cream: #FFF8E7;
			--aged-scroll: #F5E6D3;
			--ancient-paper: #E8D4B8;
			--dragon-fire: #E63946;
			--gold-coin: #FFB703;
			--health-potion: #06A77D;
			--dungeon-purple: #6A4C93;
			--shadow-black: #1D1D1D;
			--stone-gray: #686868;
			--pixel-white: #FFFFFF;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			font-family: 'Press Start 2P', cursive;
			border-radius: 0;
			text-shadow: none;
			transition: none;
		}

		body {
			min-height: 100vh;
			background: var(--parchment-cream);
			color: var(--shadow-black);
			overflow-x: hidden;
		}

		.scanlines {
			display: none;
		}

		.page {
			max-width: 1200px;
			margin: 0 auto;
			padding: 24px 20px 56px;
			position: relative;
		}

		.pixel-panel,
		.header-card,
		.node,
		.prompt,
		.chip,
		.tiny-node,
		.back-button {
			border: 4px solid var(--shadow-black);
			box-shadow: 8px 8px 0 var(--shadow-black);
		}

		.back-bar {
			margin-bottom: 20px;
			display: flex;
			align-items: center;
		}

		.back-button {
			text-decoration: none;
			display: inline-block;
			background: var(--gold-coin);
			color: var(--shadow-black);
			padding: 12px 16px;
			font-size: 0.6rem;
			line-height: 1.4;
		}

		.layout {
			display: grid;
			grid-template-columns: minmax(220px, 290px) 1fr;
			gap: 18px;
		}

		.sidebar {
			padding: 16px;
			align-self: start;
			position: sticky;
			top: 14px;
			background: var(--aged-scroll);
		}

		.title {
			font-size: 0.9rem;
			color: var(--dragon-fire);
			margin-bottom: 12px;
			line-height: 1.6;
		}

		.subtitle {
			color: var(--stone-gray);
			font-size: 1.35rem;
			margin-bottom: 16px;
			line-height: 1.5;
		}

		.legend {
			margin-top: 16px;
			padding-top: 12px;
			border-top: 4px solid var(--shadow-black);
			display: grid;
			gap: 9px;
			font-size: 1.2rem;
			color: var(--stone-gray);
			line-height: 1.5;
		}

		.legend-row {
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.tiny-node {
			width: 16px;
			height: 16px;
			border: 2px solid var(--shadow-black);
			box-shadow: 2px 2px 0 var(--shadow-black);
		}

		.tiny-node.locked {
			background: var(--stone-gray);
		}

		.tiny-node.open {
			background: var(--gold-coin);
		}

		.tiny-node.done {
			background: var(--health-potion);
		}

		.main {
			padding: 16px;
			background: var(--aged-scroll);
		}

		.header-card {
			padding: 16px;
			margin-bottom: 16px;
			background: var(--aged-scroll);
		}

		.header-links {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
			margin-top: 14px;
		}

		.header-card h2 {
			font-size: clamp(0.7rem, 1.7vw, 1rem);
			color: var(--dragon-fire);
			margin-bottom: 10px;
			line-height: 1.7;
		}

		.header-card p {
			font-size: 1.35rem;
			color: var(--stone-gray);
			max-width: 780px;
			line-height: 1.5;
		}

		.roadmap {
			position: relative;
			padding: 16px 6px 6px;
			min-height: 560px;
		}

		.path {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
			z-index: 1;
		}

		.path svg {
			width: 100%;
			height: 100%;
			display: block;
		}

		.road-spline-under {
			stroke: var(--shadow-black);
			stroke-width: 34;
			fill: none;
			stroke-linecap: round;
			stroke-linejoin: round;
		}

		.road-spline-main {
			stroke: var(--ancient-paper);
			stroke-width: 26;
			fill: none;
			stroke-linecap: round;
			stroke-linejoin: round;
		}

		.road-spline-dots {
			stroke: var(--shadow-black);
			stroke-width: 5;
			fill: none;
			stroke-linecap: round;
			stroke-dasharray: 2 16;
		}

		.lesson {
			position: relative;
			z-index: 3;
			display: flex;
			align-items: center;
			justify-content: center;
			margin: 16px 0;
			min-height: 92px;
		}

		.lesson.left {
			justify-content: flex-start;
			padding-left: 8%;
		}

		.lesson.right {
			justify-content: flex-end;
			padding-right: 8%;
		}

		.lesson.center {
			justify-content: center;
		}

		.node {
			width: min(310px, 90%);
			background: var(--aged-scroll);
			padding: 12px;
			cursor: pointer;
			position: relative;
			z-index: 4;
		}

		.node-top {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 8px;
			gap: 8px;
		}

		.badge {
			font-size: 0.5rem;
			padding: 4px 6px;
			border: 2px solid var(--shadow-black);
			color: var(--shadow-black);
			box-shadow: 2px 2px 0 var(--shadow-black);
			background: var(--dungeon-purple);
		}

		.status {
			font-size: 0.47rem;
			color: var(--shadow-black);
			padding: 4px 6px;
			border: 2px solid var(--shadow-black);
			box-shadow: 2px 2px 0 var(--shadow-black);
			background: var(--gold-coin);
		}

		.node h3 {
			font-size: 0.58rem;
			line-height: 1.65;
			color: var(--shadow-black);
			margin-bottom: 7px;
		}

		.node p {
			color: var(--stone-gray);
			font-size: 1.2rem;
			line-height: 1.4;
		}

		.node.locked {
			background: var(--stone-gray);
			color: var(--pixel-white);
			cursor: not-allowed;
		}

		.node.locked h3,
		.node.locked p {
			color: var(--pixel-white);
		}

		.node.locked .status {
			background: var(--stone-gray);
			color: var(--pixel-white);
		}

		.node.open {
			background: var(--gold-coin);
		}

		.node.done {
			background: var(--health-potion);
		}

		.node.done h3,
		.node.done p,
		.node.done .status {
			color: var(--pixel-white);
		}

		.node.done .status {
			background: var(--health-potion);
		}

		.node.open .status {
			background: var(--gold-coin);
		}

		.prompt {
			margin-top: 12px;
			padding: 12px;
			background: var(--aged-scroll);
			font-size: 1.25rem;
			color: var(--stone-gray);
			min-height: 62px;
			line-height: 1.5;
		}

		.chip-row {
			margin-top: 12px;
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
		}

		.chip {
			background: var(--gold-coin);
			color: var(--shadow-black);
			font-size: 0.5rem;
			padding: 8px;
		}

		.hub-link {
			text-decoration: none;
			display: inline-block;
			background: var(--gold-coin);
			color: var(--shadow-black);
		}

		.knight-marker {
			position: absolute;
			top: 50%;
			width: 120px;
			height: 120px;
			object-fit: contain;
			image-rendering: pixelated;
			z-index: 5;
			border: none !important;
			box-shadow: none !important;
			background: transparent !important;
			filter: drop-shadow(6px 6px 0 var(--shadow-black)) !important;
			animation: knightBob 1.2s steps(2, end) infinite;
		}

		.lesson.left .knight-marker,
		.lesson.center .knight-marker {
			right: 210px;
			transform: translateY(-50%);
		}

		.lesson.right .knight-marker {
			left: 210px;
			transform: translateY(-50%) scaleX(-1);
		}

		@keyframes knightBob {
			0% { margin-top: -2px; }
			50% { margin-top: 2px; }
			100% { margin-top: -2px; }
		}

		@media (max-width: 940px) {
			.layout {
				grid-template-columns: 1fr;
			}

			.sidebar {
				position: static;
			}
		}

		@media (max-width: 740px) {
			.lesson.left,
			.lesson.right,
			.lesson.center {
				justify-content: center;
				padding-left: 0;
				padding-right: 0;
			}

			.lesson .knight-marker {
				left: auto;
				right: -96px;
				width: 88px;
				height: 88px;
				transform: translateY(-50%);
			}

			.path {
				left: 24px;
				transform: none;
			}

			.roadmap {
				padding-left: 26px;
			}

			.lesson {
				justify-content: flex-start !important;
				padding-left: 16px;
			}

			.node {
				width: 100%;
			}
		}
	</style>
</head>
<body>
	<div class="scanlines"></div>

	<div class="page">
		<div class="back-bar">
			<a class="back-button" href="../index.html">← BACK</a>
		</div>

		<section class="layout">
			<aside class="sidebar pixel-panel" aria-label="Track Selection">
				<h1 class="title">Roadmap Guide</h1>
				<p class="subtitle">Your active track is selected on the home page.</p>

				<div class="legend" aria-label="Legend">
					<div class="legend-row"><span class="tiny-node open"></span> Open lesson</div>
					<div class="legend-row"><span class="tiny-node done"></span> Completed lesson</div>
					<div class="legend-row"><span class="tiny-node locked"></span> Locked lesson</div>
				</div>
			</aside>

			<main class="main pixel-panel" aria-live="polite">
				<section class="header-card">
					<h2 id="trackTitle">W-2 EMPLOYEE TRACK</h2>
					<p id="trackDescription">Learn to read your W-2, collect standard deductions, and file with confidence.</p>
					<div class="chip-row" id="focusChips"></div>
					<div class="header-links">
						<a class="chip hub-link" id="startTrackLink" href="w2-level-1.html">Start Track Levels</a>
						<a class="chip hub-link" id="backHomeLink" href="../index.html">Back to Home</a>
					</div>
				</section>

				<section class="roadmap" id="roadmap" aria-label="Lesson Roadmap">
					<div class="path"></div>
				</section>

				<section class="prompt" id="lessonPrompt">
					Click any open lesson to begin.
				</section>
			</main>
		</section>
	</div>

	<script>
		const tracks = [
			{
				key: "w2",
				name: "W-2 Employees",
				title: "W-2 EMPLOYEE TRACK",
				description: "Learn to read your W-2, collect standard deductions, and file with confidence.",
				focus: ["Wages", "Withholding", "Credits"],
				lessons: [
					{ title: "Spawn In: Filing Basics", type: "Level 1", detail: "Choose status, gather docs, and avoid rookie filing mistakes." },
					{ title: "Decode Your W-2", type: "Level 2", detail: "Map each box to what it means for taxes and refunds." },
					{ title: "Standard Deduction Route", type: "Level 3", detail: "Learn when the standard deduction beats itemizing." },
					{ title: "Tax Credits Power-Up", type: "Level 4", detail: "Find eligibility for education and dependent credits." },
					{ title: "Refund Boss Battle", type: "Boss", detail: "Estimate refund or balance due before filing." }
				]
			},
			{
				key: "self1099",
				name: "1099 Self-Employed",
				title: "1099 SELF-EMPLOYED TRACK",
				description: "Master income tracking, deductible expenses, and quarterly tax strategy.",
				focus: ["Schedule C", "SE Tax", "Quarterlies"],
				lessons: [
					{ title: "Gig Income Start", type: "Level 1", detail: "Understand which 1099 forms report your freelance income." },
					{ title: "Expense Inventory", type: "Level 2", detail: "Separate business expenses from personal spending." },
					{ title: "Schedule C Forge", type: "Level 3", detail: "Build a clean profit/loss statement for filing." },
					{ title: "Self-Employment Tax", type: "Level 4", detail: "Estimate SE tax and understand deductible half." },
					{ title: "Quarterly Quest", type: "Boss", detail: "Plan four estimated payments to avoid penalties." }
				]
			},
			{
				key: "investor1099b",
				name: "1099-B Investors",
				title: "1099-B INVESTOR TRACK",
				description: "Handle capital gains, wash sale rules, and portfolio tax optimization.",
				focus: ["Basis", "Gains/Losses", "Wash Sales"],
				lessons: [
					{ title: "Trade Log Setup", type: "Level 1", detail: "Read your 1099-B and confirm every covered lot." },
					{ title: "Cost Basis Repair", type: "Level 2", detail: "Fix missing basis and category codes." },
					{ title: "Short vs Long Term", type: "Level 3", detail: "Split gains by holding period for proper rates." },
					{ title: "Loss Harvesting", type: "Level 4", detail: "Use losses strategically without triggering wash sale traps." },
					{ title: "Portfolio Final Boss", type: "Boss", detail: "Complete Form 8949 + Schedule D flow." }
				]
			}
		];

		const pattern = ["center", "left", "right", "left", "center", "right"];
		const progressKey = "taxquest-progress-v1";
		const trackParam = new URLSearchParams(window.location.search).get("track");
		let currentTrack = tracks.find((track) => track.key === trackParam) || tracks[0];

		const trackLessonUrls = {
			w2: [
				"w2-level-1.html",
				"w2-level-2.html",
				"w2-level-3.html",
				"w2-level-4.html",
				"w2-level-5.html"
			],
			self1099: [
				"self1099-level-1.html",
				"self1099-level-2.html",
				"self1099-level-3.html",
				"self1099-level-4.html",
				"self1099-level-5.html"
			],
			investor1099b: [
				"investor1099b-level-1.html",
				"investor1099b-level-2.html",
				"investor1099b-level-3.html",
				"investor1099b-level-4.html",
				"investor1099b-level-5.html"
			]
		};

		const roadmap = document.getElementById("roadmap");
		const trackTitle = document.getElementById("trackTitle");
		const trackDescription = document.getElementById("trackDescription");
		const focusChips = document.getElementById("focusChips");
		const lessonPrompt = document.getElementById("lessonPrompt");
		const startTrackLink = document.getElementById("startTrackLink");
		const backHomeLink = document.getElementById("backHomeLink");

		const trackStartMap = {
			w2: "w2-level-1.html",
			self1099: "self1099-level-1.html",
			investor1099b: "investor1099b-level-1.html"
		};

		function readProgress() {
			try {
				return JSON.parse(window.localStorage.getItem(progressKey) || "{}");
			} catch (_err) {
				return {};
			}
		}

		function levelFile(trackKey, index) {
			const url = trackLessonUrls[trackKey]?.[index] || "";
			return url.split("/").pop();
		}

		function isLevelDone(trackKey, index) {
			const file = levelFile(trackKey, index);
			if (!file) return false;
			const progress = readProgress();
			return Boolean(progress[file] && progress[file].completed);
		}

		function lessonState(trackKey, index) {
			if (isLevelDone(trackKey, index)) return "done";
			if (index === 0) return "open";
			return isLevelDone(trackKey, index - 1) ? "open" : "locked";
		}

		function nextTrackUrl(trackKey) {
			const urls = trackLessonUrls[trackKey] || [];
			for (let index = 0; index < urls.length; index += 1) {
				if (lessonState(trackKey, index) === "open") return urls[index];
			}
			return urls[urls.length - 1] || trackStartMap[trackKey] || "index.html";
		}

		function drawHeader() {
			trackTitle.textContent = currentTrack.title;
			trackDescription.textContent = currentTrack.description;
			startTrackLink.href = nextTrackUrl(currentTrack.key);
			backHomeLink.href = "../index.html";
			focusChips.innerHTML = "";
			currentTrack.focus.forEach((item) => {
				const chip = document.createElement("span");
				chip.className = "chip";
				chip.textContent = item;
				focusChips.appendChild(chip);
			});
			document.title = "Tax Quest";
		}

		function drawRoadmap() {
			const path = roadmap.querySelector(".path");
			roadmap.innerHTML = "";
			roadmap.appendChild(path);
			const stateList = [];

			currentTrack.lessons.forEach((lesson, index) => {
				const state = lessonState(currentTrack.key, index);
				stateList.push(state);

				const wrap = document.createElement("article");
				const pos = pattern[index % pattern.length];
				wrap.className = `lesson ${pos}`;

				const node = document.createElement("button");
				node.type = "button";
				node.className = `node ${state}`;
				node.setAttribute("aria-label", `${lesson.title} ${state}`);
				const lessonUrl = trackLessonUrls[currentTrack.key]?.[index];

				node.innerHTML = `
					<div class="node-top">
						<span class="badge">${lesson.type}</span>
						<span class="status">${state.toUpperCase()}</span>
					</div>
					<h3>${lesson.title}</h3>
					<p>${lesson.detail}</p>
				`;

				node.addEventListener("click", () => {
					if (state === "locked") {
						lessonPrompt.textContent = "This lesson is locked. Beat the previous level first!";
						return;
					}
					lessonPrompt.textContent = `Opening ${lesson.title}...`;
					window.location.href = lessonUrl || "index.html";
				});

				wrap.appendChild(node);
				roadmap.appendChild(wrap);
			});

			renderWindingPath();
			placeKnight(stateList);
		}

		function renderWindingPath() {
			const path = roadmap.querySelector(".path");
			if (!path) return;

			const lessons = Array.from(roadmap.querySelectorAll(".lesson"));
			if (!lessons.length) {
				path.innerHTML = "";
				return;
			}

			const roadmapRect = roadmap.getBoundingClientRect();
			const points = lessons.map((lesson) => {
				const node = lesson.querySelector(".node");
				const rect = node.getBoundingClientRect();
				return {
					x: rect.left - roadmapRect.left + rect.width / 2,
					y: rect.top - roadmapRect.top + rect.height / 2
				};
			});

			if (!points.length) {
				path.innerHTML = "";
				return;
			}

			const tension = 0.28;
			let d = `M ${points[0].x.toFixed(2)} ${points[0].y.toFixed(2)}`;
			for (let index = 0; index < points.length - 1; index += 1) {
				const prev = points[index - 1] || points[index];
				const current = points[index];
				const next = points[index + 1];
				const next2 = points[index + 2] || next;

				const cp1x = current.x + (next.x - prev.x) * tension;
				const cp1y = current.y + (next.y - prev.y) * tension;
				const cp2x = next.x - (next2.x - current.x) * tension;
				const cp2y = next.y - (next2.y - current.y) * tension;

				d += ` C ${cp1x.toFixed(2)} ${cp1y.toFixed(2)}, ${cp2x.toFixed(2)} ${cp2y.toFixed(2)}, ${next.x.toFixed(2)} ${next.y.toFixed(2)}`;
			}

			path.innerHTML = `
				<svg viewBox="0 0 ${roadmap.clientWidth} ${roadmap.clientHeight}" preserveAspectRatio="none" aria-hidden="true">
					<path class="road-spline-under" d="${d}"></path>
					<path class="road-spline-main" d="${d}"></path>
					<path class="road-spline-dots" d="${d}"></path>
				</svg>
			`;
		}

		function placeKnight(stateList) {
			const lessons = Array.from(roadmap.querySelectorAll(".lesson"));
			if (!lessons.length) return;

			let targetIndex = stateList.findIndex((state) => state === "open");
			if (targetIndex < 0) targetIndex = stateList.length - 1;
			if (targetIndex < 0 || !lessons[targetIndex]) return;

			const knight = document.createElement("img");
			knight.className = "knight-marker";
			if (currentTrack.key === "self1099") {
				knight.src = "../imgs/wizard.png";
				knight.alt = "Wizard marker";
			} else {
				knight.src = "../imgs/knight.png";
				knight.alt = "Knight marker";
			}
			lessons[targetIndex].appendChild(knight);
		}

		drawHeader();
		drawRoadmap();
		lessonPrompt.textContent = "Open lessons are gold. Completed lessons are green. Finish a level to unlock the next.";

		window.addEventListener("resize", () => {
			renderWindingPath();
		});
	</script>
</body>
</html>
