<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="../imgs/favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tax Quest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --parchment-cream: #FFF8E7;
      --aged-scroll: #F5E6D3;
      --ancient-paper: #E8D4B8;
      --dragon-fire: #E63946;
      --gold-coin: #FFB703;
      --health-potion: #06A77D;
      --dungeon-purple: #6A4C93;
      --shadow-black: #1D1D1D;
      --stone-gray: #686868;
      --pixel-white: #FFFFFF;
      --border: 4px solid var(--shadow-black);
      --shadow: 8px 8px 0 var(--shadow-black);
      --space-1: 8px;
      --space-2: 16px;
      --space-3: 24px;
      --space-4: 32px;
      --space-5: 40px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      image-rendering: pixelated;
    }

    body {
      font-family: 'Press Start 2P', cursive;
      background: var(--parchment-cream);
      background-image: url('../imgs/cobble.png');
      background-repeat: repeat;
      color: var(--shadow-black);
      min-height: 100vh;
      padding: var(--space-3);
      line-height: 1.8;
    }

    button, input {
      font-family: 'Press Start 2P', cursive;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
    }

    .panel {
      border: var(--border);
      box-shadow: var(--shadow);
    }

    .header {
      background: var(--aged-scroll);
      padding: var(--space-2) var(--space-3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-5);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      min-width: 0;
    }

    .brand-icon {
      width: 52px;
      height: 52px;
      border: var(--border);
      box-shadow: var(--shadow);
      background: var(--dragon-fire);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon img {
      width: 70%;
      height: 70%;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .brand-text {
      font-size: 0.9rem;
      line-height: 1.6;
      text-transform: uppercase;
    }

    .brand-sub {
      display: block;
      color: var(--stone-gray);
      font-size: 0.52rem;
      margin-top: 4px;
    }

    .back-link {
      display: inline-block;
      text-decoration: none;
      color: var(--shadow-black);
      background: var(--pixel-white);
      border: var(--border);
      box-shadow: var(--shadow);
      padding: 14px 18px;
      font-size: 0.58rem;
      text-transform: uppercase;
    }

    .back-link:hover,
    .back-link:focus-visible {
      transform: translate(4px, 4px);
      box-shadow: 4px 4px 0 var(--shadow-black);
      outline: none;
    }

    .auth-wrap {
      max-width: 560px;
      margin: 0 auto;
      background: var(--aged-scroll);
      padding: var(--space-4);
    }

    h1 {
      font-size: clamp(1rem, 3vw, 1.6rem);
      line-height: 1.5;
      margin-bottom: var(--space-2);
      text-transform: uppercase;
    }

    .subtitle {
      color: var(--stone-gray);
      font-size: 0.58rem;
      margin-bottom: var(--space-4);
    }

    .form-group {
      margin-bottom: var(--space-3);
    }

    label {
      display: block;
      font-size: 0.58rem;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      border: var(--border);
      box-shadow: 4px 4px 0 var(--shadow-black);
      background: var(--pixel-white);
      padding: 16px;
      font-size: 0.58rem;
      color: var(--shadow-black);
      outline: none;
    }

    input:focus {
      background: var(--parchment-cream);
    }

    .btn {
      width: 100%;
      border: var(--border);
      box-shadow: var(--shadow);
      padding: 14px 18px;
      font-size: 0.58rem;
      text-transform: uppercase;
      cursor: pointer;
      background: var(--gold-coin);
      color: var(--shadow-black);
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translate(4px, 4px);
      box-shadow: 4px 4px 0 var(--shadow-black);
      outline: none;
    }

    .btn-google {
      background: var(--pixel-white);
      margin-top: var(--space-2);
    }

    .divider {
      text-align: center;
      font-size: 0.52rem;
      color: var(--stone-gray);
      margin: var(--space-3) 0;
      text-transform: uppercase;
    }

    .helper {
      margin-top: var(--space-3);
      text-align: center;
      font-size: 0.52rem;
      color: var(--stone-gray);
    }

    .auth-message {
      min-height: 0;
      padding: 0;
    }

    .auth-message:not(:empty) {
      border: var(--border);
      box-shadow: 4px 4px 0 var(--shadow-black);
      background: var(--pixel-white);
      color: var(--dragon-fire);
      padding: 12px;
      line-height: 1.6;
    }

    .auth-message.success:not(:empty) {
      color: var(--health-potion);
    }

    .helper a {
      color: var(--shadow-black);
    }

    .footer {
      margin-top: var(--space-5);
      background: var(--gold-coin);
      text-align: center;
      padding: var(--space-3);
      font-size: 0.52rem;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header panel">
      <div class="brand">
        <div class="brand-icon">
          <img src="../imgs/file.png" alt="Tax Quest Icon">
        </div>
        <div class="brand-text">
          Tax Quest
          <span class="brand-sub">Gamify your taxes</span>
        </div>
      </div>
      <a class="back-link" href="../index.html">Back</a>
    </header>

    <main class="auth-wrap panel">
      <h1>Sign Up</h1>
      <p class="subtitle">Create an account to get started.</p>

      <form id="signupForm">
        <div class="form-group">
          <label>Email</label>
          <input id="email" type="email" placeholder="Email" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Password" />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Confirm Password" />
        </div>

        <button class="btn" type="submit">Sign Up</button>

        <div class="divider">or</div>

        <button class="btn btn-google" id="googleSignupBtn" type="button">
          Continue with Google
        </button>
      </form>

      <p id="message" class="helper auth-message" aria-live="polite"></p>

      <p class="helper">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </main>

    <footer class="footer panel">
      Created by Molly, Spencer, and Thomas    
    </footer>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      GoogleAuthProvider,
      getRedirectResult,
      onAuthStateChanged,
      signInWithPopup,
      signInWithRedirect
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAWNfkXZgU9F6qmiiVyUAFYKJ45g1DytT4",
      authDomain: window.location.hostname === "hackku26.web.app" ? "hackku26.web.app" : "hackku26.firebaseapp.com",
      projectId: "hackku26",
      storageBucket: "hackku26.firebasestorage.app",
      messagingSenderId: "866677744105",
      appId: "1:866677744105:web:1278957a9058ac0f422b78",
      measurementId: "G-5EJ4KBGBDG"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const form = document.getElementById('signupForm');
    const googleBtn = document.getElementById('googleSignupBtn');
    const message = document.getElementById('message');

    function formatAuthError(error) {
      const code = error && error.code ? error.code : '';
      const messages = {
        'auth/email-already-in-use': 'An account already exists for that email.',
        'auth/invalid-email': 'Enter a valid email address.',
        'auth/missing-password': 'Enter a password.',
        'auth/weak-password': 'Use a password with at least 6 characters.',
        'auth/popup-closed-by-user': 'Google sign-in was closed before it finished.',
        'auth/popup-blocked': 'Your browser blocked the Google sign-in popup. Trying redirect sign-in instead.',
        'auth/cancelled-popup-request': 'Google sign-in was cancelled.',
        'auth/account-exists-with-different-credential': 'An account already exists with this email. Try logging in another way.',
        'auth/network-request-failed': 'Network error. Check your connection and try again.'
      };

      return messages[code] || 'Sign up failed. Please try again.';
    }

    function showMessage(text, type = 'error') {
      message.textContent = text;
      message.classList.toggle('success', type === 'success');
    }

    function clearMessage() {
      message.textContent = '';
      message.classList.remove('success');
    }

    getRedirectResult(auth)
      .then((result) => {
        if (result || auth.currentUser) {
          window.location.href = '../index.html';
        }
      })
      .catch((err) => {
        showMessage(formatAuthError(err));
      });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = '../index.html';
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessage();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        showMessage('Passwords do not match.');
        return;
      }

      try {
        await createUserWithEmailAndPassword(
          auth,
          document.getElementById('email').value,
          password
        );
        window.location.href = '../index.html';
      } catch (err) {
        showMessage(formatAuthError(err));
      }
    });

    googleBtn.addEventListener('click', async () => {
      clearMessage();

      try {
        const provider = new GoogleAuthProvider();
        await signInWithPopup(auth, provider);
        window.location.href = '../index.html';
      } catch (err) {
        if (err && err.code === 'auth/popup-blocked') {
          const provider = new GoogleAuthProvider();
          await signInWithRedirect(auth, provider);
          return;
        }

        showMessage(formatAuthError(err));
      }
    });
  </script>
</body>
</html>
